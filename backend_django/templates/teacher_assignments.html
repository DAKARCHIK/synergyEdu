{% extends "base.html" %}
{% block title %}Задания преподавателя | SynergyEdu{% endblock %}
{% block content %}
<div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
  <h1 class="h4 mb-0">Задания преподавателя</h1>
  <a
    href="{% url 'teacher_assignment_create_modal' %}{% if selected_course %}?course={{ selected_course }}{% endif %}"
    class="btn btn-primary"
    hx-get="{% url 'teacher_assignment_create_modal' %}{% if selected_course %}?course={{ selected_course }}{% endif %}"
    hx-target="#appModal"
    hx-swap="innerHTML">
    Создать задание
  </a>
</div>

<div class="card shadow-sm mb-3">
  <div class="card-body">
    <label for="course-filter" class="form-label">Фильтр по курсу</label>
    <select
      id="course-filter"
      class="form-select"
      name="course"
      hx-get="{% url 'teacher_assignments' %}"
      hx-target="#teacher-assignment-list"
      hx-trigger="change">
      <option value="">Все курсы</option>
      {% for course in courses %}
        <option value="{{ course.id }}" {% if selected_course|stringformat:"s" == course.id|stringformat:"s" %}selected{% endif %}>{{ course.title }}</option>
      {% endfor %}
    </select>
  </div>
</div>
<div id="teacher-assignment-list">
  {% include "partials/teacher_assignments_list.html" %}
</div>
{% endblock %}
