{% load static %}
<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SynergyEdu</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
      <a class="navbar-brand" href="/">SynergyEdu</a>
      {% if user.is_authenticated %}
        <div class="navbar-nav">
          <a class="nav-link" href="/">Dashboard</a>
          <a class="nav-link" href="/student/schedule">Schedule</a>
          <a class="nav-link" href="/student/assignments">Assignments</a>
          <a class="nav-link" href="/student/grades">Grades</a>
          <a class="nav-link" href="/student/announcements">Announcements</a>
          <a class="nav-link" href="/teacher/assignments">Teacher</a>
          <a class="nav-link" href="/teacher/announcements">Teacher Announcements</a>
          <a class="nav-link" href="/admin/">Admin</a>
          <a class="nav-link text-warning" href="/logout">Logout</a>
        </div>
      {% endif %}
    </div>
  </nav>

  <main class="container pb-4">
    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags|default:'info' }}">{{ message }}</div>
      {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
