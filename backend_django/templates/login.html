{% extends "base.html" %}
{% block title %}Вход | SynergyEdu{% endblock %}
{% block auth_content %}
<div class="card">
  <div class="card-body p-4 p-lg-5">
    <div class="text-center mb-4">
      <h1 class="h4 mb-1">Вход в SynergyEdu</h1>
      <p class="text-muted mb-0">Учебный портал Техникума</p>
    </div>
    <form method="post" class="d-grid gap-3">
      {% csrf_token %}
      <div>
        <label for="{{ form.username.id_for_label }}" class="form-label">Логин</label>
        <input
          type="text"
          name="{{ form.username.html_name }}"
          id="{{ form.username.id_for_label }}"
          class="form-control form-control-lg"
          value="{{ form.username.value|default:'' }}"
          required
          autofocus>
      </div>
      <div>
        <label for="{{ form.password.id_for_label }}" class="form-label">Пароль</label>
        <input
          type="password"
          name="{{ form.password.html_name }}"
          id="{{ form.password.id_for_label }}"
          class="form-control form-control-lg"
          required>
      </div>
      {% if form.non_field_errors %}
        <div class="alert alert-danger py-2 mb-0">{{ form.non_field_errors|striptags }}</div>
      {% endif %}
      <button type="submit" class="btn btn-primary btn-lg w-100">Войти</button>
    </form>
  </div>
</div>
{% endblock %}
